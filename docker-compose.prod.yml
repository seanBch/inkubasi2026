version: "3.9"

services:
  postgres:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./server
    restart: always
    depends_on:
      - postgres
    environment:
      NODE_ENV: production

  frontend:
    build: ./client
    restart: always
    depends_on:
      - backend

volumes:
  postgres_data:
